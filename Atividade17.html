<html>
	<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
		<style>


		</style>

  <script>
  function calcular(){
            var tabuada = " ";
	    tab = parseInt(document.getElementById("numberzinho").value);
              for(var i=1; i<=10 ; i++){
  		 tabuada = tabuada + tab + " * " + i + " = " + tab*i + "<br>";		  
}
	     resultado.innerHTML = tabuada;

}
  </script>



		</script>

	</head>

	<body>


		<form>
			<h1>Vamos fazer uma tabuada juntos, ieee</h1>
			<br>
			Escolha a tabuada desejada: <input type="text" name="numberzinho" id="numberzinho">

			<br>
			<center>
			<input type="button" name="botaozinho1" id="botaozinho1" class="btn btn-info" value="RUN" onClick="javascript:calcular()">
			<input type="reset" name="ok" id="ok" class="btn btn-dark" value="Apagar TUDO">
			</center>
		</form>
		<div id="resultado">  </div>


	</body>	
</html>
